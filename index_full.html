<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>مساعد الزيتون</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #06101f;
            --bg2: #0d1f35;
            --surface: rgba(13, 31, 53, 0.85);
            --border: rgba(74, 157, 100, 0.2);
            --green: #4a9d64;
            --green-light: #6abf82;
            --green-glow: rgba(74, 157, 100, 0.35);
            --gold: #c9a227;
            --gold-light: #e4bc45;
            --text: #e8f0e9;
            --text-muted: #7a9e82;
            --red: #c0392b;
            --red-glow: rgba(192, 57, 43, 0.4);
            --radius: 20px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', 'IBM Plex Sans Arabic', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(74, 157, 100, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(201, 162, 39, 0.06) 0%, transparent 60%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 12px;
        }
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .olive-icon {
            font-size: 2.4rem;
            filter: drop-shadow(0 0 12px var(--green-glow));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        h1 {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--green-light), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.88rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* ── Main card ── */
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
        }

        /* ── Section labels ── */
        .section-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Camera section ── */
        .camera-section { margin-bottom: 24px; }
        .camera-area {
            width: 100%;
            min-height: 180px;
            aspect-ratio: 16/9;
            border: 2px dashed var(--border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
            background: rgba(6, 16, 31, 0.5);
        }
        .camera-area:hover {
            border-color: var(--green);
            background: rgba(74, 157, 100, 0.05);
        }
        .camera-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        .camera-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }
        .camera-placeholder i { font-size: 2.2rem; opacity: 0.6; }
        .camera-placeholder span { font-size: 0.9rem; }
        #file-input { display: none; }

        /* CNN result badge */
        .cnn-badge {
            display: none;
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(74, 157, 100, 0.1);
            border: 1px solid rgba(74, 157, 100, 0.3);
            border-radius: 10px;
            font-size: 0.9rem;
            align-items: center;
            gap: 10px;
        }
        .cnn-badge.visible { display: flex; }
        .cnn-badge .label { font-weight: 600; color: var(--green-light); }
        .cnn-badge .conf { font-size: 0.78rem; color: var(--text-muted); margin-right: auto; }

        /* ── Voice section ── */
        .voice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .mic-btn {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--green), #2d7a45);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 28px var(--green-glow), 0 0 0 0 var(--green-glow);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            position: relative;
        }
        .mic-btn:hover:not(:disabled) { transform: scale(1.06); }
        .mic-btn:active:not(:disabled) { transform: scale(0.94); }
        .mic-btn.recording {
            background: linear-gradient(145deg, var(--red), #8b1a14);
            box-shadow: 0 0 0 0 var(--red-glow);
            animation: pulse-rec 1.4s infinite;
        }
        @keyframes pulse-rec {
            0%   { box-shadow: 0 0 0 0 var(--red-glow); }
            70%  { box-shadow: 0 0 0 22px rgba(192,57,43,0); }
            100% { box-shadow: 0 0 0 0 rgba(192,57,43,0); }
        }
        .mic-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-line {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 22px;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(74,157,100,0.3);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        .spinner.visible { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Transcription preview */
        .transcription-box {
            width: 100%;
            background: rgba(6,16,31,0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1.15rem;
            line-height: 1.6;
            text-align: right;
            direction: rtl;
            color: var(--text);
            min-height: 58px;
            display: none;
        }
        .transcription-box.visible { display: block; }

        /* ── Answer section ── */
        .answer-section { display: none; }
        .answer-section.visible { display: block; }

        .answer-box {
            background: rgba(6, 16, 31, 0.6);
            border: 1px solid rgba(74,157,100,0.25);
            border-right: 3px solid var(--green);
            border-radius: 12px;
            padding: 16px 18px;
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: right;
            direction: rtl;
            margin-bottom: 14px;
        }
        .answer-box.refused {
            border-right-color: var(--gold);
            background: rgba(201, 162, 39, 0.05);
        }

        /* Sources */
        .sources-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
            margin-bottom: 14px;
        }
        .source-tag {
            padding: 3px 10px;
            background: rgba(74,157,100,0.12);
            border: 1px solid rgba(74,157,100,0.25);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--green-light);
        }

        /* Play button */
        .play-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(74,157,100,0.12);
            border: 1px solid rgba(74,157,100,0.3);
            border-radius: 12px;
            padding: 10px 18px;
            color: var(--green-light);
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            width: 100%;
            justify-content: center;
            transition: background 0.2s;
        }
        .play-btn:hover { background: rgba(74,157,100,0.2); }
        .play-btn.playing { background: rgba(74,157,100,0.25); }

        /* Relevance bar */
        .relevance-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .rel-bar-track {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .rel-bar-fill {
            height: 100%;
            background: var(--green);
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        /* ── Footer ── */
        footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(122,158,130,0.5);
        }

        /* ── Waveform animation ── */
        .waveform {
            display: none;
            gap: 3px;
            align-items: center;
            height: 24px;
        }
        .waveform.visible { display: flex; }
        .wave-bar {
            width: 3px;
            background: var(--red);
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }
        .wave-bar:nth-child(1) { animation-delay: 0.0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.2s; }
        .wave-bar:nth-child(6) { animation-delay: 0.1s; }
        @keyframes wave {
            0%,100% { height: 6px; }
            50% { height: 22px; }
        }

        /* ── Score dot ── */
        .score-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        /* ── Responsive Improvements ── */
        @media (max-width: 480px) {
            body { padding: 12px 12px 30px; }
            header { margin-bottom: 20px; }
            h1 { font-size: 1.6rem; }
            .olive-icon { font-size: 2rem; }
            .card { padding: 20px 16px; border-radius: 16px; }
            .mic-btn { width: 72px; height: 72px; font-size: 1.6rem; }
            .transcription-box { font-size: 1rem; padding: 12px; }
            .answer-box { font-size: 1rem; padding: 14px; line-height: 1.6; }
            .camera-area { min-height: 160px; }
        }

        @media (max-height: 700px) {
            header { margin-bottom: 15px; }
            .voice-section { gap: 12px; margin-bottom: 15px; }
            .mic-btn { width: 68px; height: 68px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-wrap">
        <span class="olive-icon">🫒</span>
        <h1>مساعد الزيتون</h1>
    </div>
    <p class="subtitle">Powered by ASR · RAG · LLM · TTS</p>
</header>

<div class="card">

    <!-- ── Camera / Image section ── -->
    <div class="camera-section">
        <div class="section-label"><i class="fas fa-camera"></i> صورة الورقة</div>
        <div class="camera-area" id="camera-area" onclick="document.getElementById('file-input').click()">
            <div class="camera-placeholder" id="cam-placeholder">
                <i class="fas fa-camera-retro"></i>
                <span>اضغط لتصوير أو رفع صورة ورقة زيتون</span>
            </div>
            <img id="preview-img" style="display:none" alt="olive leaf preview">
        </div>
        <input type="file" id="file-input" accept="image/*" capture="environment">

        <!-- CNN result -->
        <div class="cnn-badge" id="cnn-badge">
            <i class="fas fa-leaf" style="color: var(--green-light)"></i>
            <span>تشخيص CNN:</span>
            <span class="label" id="cnn-label-text">—</span>
            <span class="conf" id="cnn-conf-text"></span>
        </div>
    </div>

    <!-- ── Voice section ── -->
    <div class="voice-section">
        <div class="section-label" style="width:100%"><i class="fas fa-microphone-alt"></i> سؤالك بالصوت</div>

        <button class="mic-btn" id="mic-btn" title="اضغط للتحدث">
            <i class="fas fa-microphone" id="mic-icon"></i>
        </button>

        <div class="status-line">
            <div class="spinner" id="spinner"></div>
            <div class="waveform" id="waveform">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
            <span id="status-text">اضغط على الميكروفون وتكلم</span>
        </div>

        <div class="transcription-box" id="transcription-box" dir="rtl"></div>
    </div>

    <!-- ── Answer section ── -->
    <div class="answer-section" id="answer-section">
        <div class="section-label"><i class="fas fa-comment-dots"></i> الجواب</div>

        <div class="answer-box" id="answer-box" dir="rtl"></div>

        <div class="sources-row" id="sources-row"></div>

        <button class="play-btn" id="play-btn" style="display:none">
            <i class="fas fa-volume-up"></i>
            <span>اسمع الجواب بالصوت</span>
        </button>

        <div class="relevance-row" id="rel-row" style="display:none">
            <span>درجة الملاءمة</span>
            <div class="rel-bar-track">
                <div class="rel-bar-fill" id="rel-bar" style="width:0%"></div>
            </div>
            <span id="rel-score">0%</span>
        </div>
    </div>
</div>

<footer>
    ASR: Whisper Tunisian · CNN: PlantVillage · RAG: FAISS + Claude · TTS: edge-tts
</footer>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const ASR_URL  = "http://localhost:8001/transcribe";
const RAG_URL  = "http://localhost:8002/query";
const CNN_URL  = "http://localhost:8003/classify";  // your CNN server

// ── State ─────────────────────────────────────────────────────────────────
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let currentAudio = null;
let cnnLabel = null;
let cnnConf = null;
let currentAudioUrl = null;

// ── DOM refs ──────────────────────────────────────────────────────────────
const micBtn          = document.getElementById('mic-btn');
const micIcon         = document.getElementById('mic-icon');
const statusText      = document.getElementById('status-text');
const spinner         = document.getElementById('spinner');
const waveform        = document.getElementById('waveform');
const transcriptionBox= document.getElementById('transcription-box');
const answerSection   = document.getElementById('answer-section');
const answerBox       = document.getElementById('answer-box');
const sourcesRow      = document.getElementById('sources-row');
const playBtn         = document.getElementById('play-btn');
const relRow          = document.getElementById('rel-row');
const relBar          = document.getElementById('rel-bar');
const relScore        = document.getElementById('rel-score');
const fileInput       = document.getElementById('file-input');
const previewImg      = document.getElementById('preview-img');
const camPlaceholder  = document.getElementById('cam-placeholder');
const cnnBadge        = document.getElementById('cnn-badge');
const cnnLabelText    = document.getElementById('cnn-label-text');
const cnnConfText     = document.getElementById('cnn-conf-text');

// ── Image / CNN ───────────────────────────────────────────────────────────
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Show preview
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewImg.style.display = 'block';
    camPlaceholder.style.display = 'none';

    // Call CNN classifier
    setStatus('جاري تحليل الصورة...', true);
    try {
        const formData = new FormData();
        formData.append('image', file);
        const res = await fetch(CNN_URL, { method: 'POST', body: formData });
        if (res.ok) {
            const data = await res.json();
            cnnLabel = data.label || data.class;
            cnnConf  = data.confidence || data.score;
            cnnLabelText.textContent = cnnLabel;
            cnnConfText.textContent  = cnnConf ? `(${(cnnConf * 100).toFixed(1)}%)` : '';
            cnnBadge.classList.add('visible');
            setStatus('الصورة تحُللت — تكلم الآن', false);
        }
    } catch {
        // CNN server might not be running yet
        setStatus('CNN: فشل الاتصال — اسأل بالصوت بدون صورة', false);
    }
});

// ── WAV encoding helpers ──────────────────────────────────────────────────
function encodeWAV(samples, sampleRate) {
    const buf = new ArrayBuffer(44 + samples.length * 2);
    const v   = new DataView(buf);
    const ws  = (o, s) => { for (let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
    ws(0,'RIFF'); v.setUint32(4,36+samples.length*2,true); ws(8,'WAVE');
    ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sampleRate,true); v.setUint32(28,sampleRate*2,true);
    v.setUint16(32,2,true); v.setUint16(34,16,true); ws(36,'data');
    v.setUint32(40,samples.length*2,true);
    let off=44;
    for (let i=0;i<samples.length;i++) {
        const s=Math.max(-1,Math.min(1,samples[i]));
        v.setInt16(off,s<0?s*32768:s*32767,true); off+=2;
    }
    return new Blob([buf],{type:'audio/wav'});
}

async function resample(audioBuffer, targetSR) {
    if (audioBuffer.sampleRate === targetSR) return audioBuffer.getChannelData(0);
    const ctx = new OfflineAudioContext(1, Math.ceil(audioBuffer.duration*targetSR), targetSR);
    const src = ctx.createBufferSource();
    src.buffer = audioBuffer; src.connect(ctx.destination); src.start(0);
    const rendered = await ctx.startRendering();
    return rendered.getChannelData(0);
}

// ── Status helpers ─────────────────────────────────────────────────────────
function setStatus(msg, loading=false) {
    statusText.textContent = msg;
    spinner.classList.toggle('visible', loading);
}

// ── Mic recording ──────────────────────────────────────────────────────────
micBtn.addEventListener('click', async () => {
    if (!isRecording) {
        // Start recording
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.addEventListener('dataavailable', e => audioChunks.push(e.data));
            mediaRecorder.addEventListener('stop', handleStop);
            mediaRecorder.start();

            isRecording = true;
            micBtn.classList.add('recording');
            micIcon.className = 'fas fa-stop';
            waveform.classList.add('visible');
            setStatus('جاري التسجيل... اضغط للإيقاف', false);

            // Hide previous answer
            answerSection.classList.remove('visible');
            transcriptionBox.classList.remove('visible');
        } catch {
            alert('خطأ: لا يمكن الوصول للميكروفون');
        }
    } else {
        // Stop recording
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.disabled = true;
        micIcon.className = 'fas fa-microphone';
        waveform.classList.remove('visible');
        setStatus('جاري معالجة الصوت...', true);
    }
});

async function handleStop() {
    try {
        // 1. Prepare WAV at 16kHz mono
        const blob   = new Blob(audioChunks);
        const arrBuf = await blob.arrayBuffer();
        const actx   = new (window.AudioContext||window.webkitAudioContext)();
        const audioBuf = await actx.decodeAudioData(arrBuf);
        const samples  = await resample(audioBuf, 16000);
        const wav      = encodeWAV(samples, 16000);

        // 2. ASR → Arabic text
        setStatus('جاري التحويل من صوت إلى نص...', true);
        const fd = new FormData();
        fd.append('audio', wav, 'recording.wav');
        const asrRes  = await fetch(ASR_URL, { method: 'POST', body: fd });
        if (!asrRes.ok) throw new Error('ASR failed');
        const asrData = await asrRes.json();
        const question = asrData.text || '';

        // Show transcription
        transcriptionBox.textContent = question;
        transcriptionBox.classList.add('visible');

        // 3. RAG query
        setStatus('جاري البحث في قاعدة البيانات...', true);
        const ragRes  = await fetch(RAG_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: question,
                cnn_label: cnnLabel,
                cnn_confidence: cnnConf
            })
        });
        if (!ragRes.ok) throw new Error('RAG failed');
        const ragData = await ragRes.json();

        // 4. Show answer
        showAnswer(ragData);

    } catch (err) {
        console.error(err);
        setStatus('خطأ في المعالجة — عاود المحاولة', false);
        answerBox.textContent = `خطأ: ${err.message}`;
        answerSection.classList.add('visible');
    } finally {
        micBtn.disabled = false;
        setStatus('اضغط على الميكروفون وتكلم', false);
    }
}

function showAnswer(data) {
    // Answer text
    answerBox.textContent = data.answer_text;
    answerBox.className = 'answer-box' + (data.refused ? ' refused' : '');

    // Sources
    sourcesRow.innerHTML = '';
    (data.source_citations || []).forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = s;
        sourcesRow.appendChild(tag);
    });

    // Relevance bar
    if (!data.refused && data.top_score !== undefined) {
        const pct = Math.round(data.top_score * 100);
        relBar.style.width = pct + '%';
        relScore.textContent = pct + '%';
        relRow.style.display = 'flex';
    } else {
        relRow.style.display = 'none';
    }

    // TTS play button
    currentAudioUrl = data.audio_url ? `http://localhost:8002${data.audio_url}` : null;
    if (currentAudioUrl) {
        playBtn.style.display = 'flex';
        playBtn.onclick = () => playAudio(currentAudioUrl);
    } else {
        playBtn.style.display = 'none';
    }

    answerSection.classList.add('visible');

    // Auto-play audio response
    if (currentAudioUrl) {
        setTimeout(() => playAudio(currentAudioUrl), 400);
    }
}

function playAudio(url) {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
        playBtn.classList.remove('playing');
        playBtn.innerHTML = '<i class="fas fa-volume-up"></i><span>اسمع الجواب بالصوت</span>';
        return;
    }
    currentAudio = new Audio(url);
    currentAudio.play();
    playBtn.classList.add('playing');
    playBtn.innerHTML = '<i class="fas fa-stop"></i><span>إيقاف الصوت</span>';
    currentAudio.onended = () => {
        currentAudio = null;
        playBtn.classList.remove('playing');
        playBtn.innerHTML = '<i class="fas fa-volume-up"></i><span>اسمع الجواب بالصوت</span>';
    };
}
</script>
</body>
</html>
